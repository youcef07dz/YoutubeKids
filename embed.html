<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مشغل الفيديو</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f0f;
      font-family: 'Segoe UI', 'Tahoma', 'Noto Sans Arabic', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .top-bar {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      gap: 16px;
    }
    .back-btn {
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      background: rgba(255,255,255,0.1);
      transition: background 0.2s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.2); }
    .player-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px 16px;
    }
    .player-container {
      width: 100%;
      max-width: 1000px;
      position: relative;
      padding-top: 56.25%;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
    }
    .player-container iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }
    .placeholder {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #888;
      font-size: 18px;
      gap: 12px;
    }
    .placeholder .big-icon { font-size: 64px; opacity: 0.4; }
    @media (max-width: 600px) {
      .player-wrap { padding: 0 8px 8px; }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <a class="back-btn" href="index.html">&larr; القنوات</a>
  </div>
  <div class="player-wrap">
    <div class="player-container">
      <div class="placeholder" id="placeholder">
        <div class="big-icon">&#9654;</div>
        <div>أدخل معرف فيديو: embed.html#VIDEO_ID</div>
      </div>
      <iframe id="player" style="display:none;" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
  </div>
  <script>
    const id = window.location.hash.substring(1);
    if (id) {
      document.getElementById('placeholder').style.display = 'none';
      const frame = document.getElementById('player');
      frame.style.display = 'block';
      frame.src = `https://www.youtube.com/embed/${id}?autoplay=1`;
    }
  </script>
</body>
</html>
